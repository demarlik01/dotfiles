# ----------------------------------------
# Mouse
# ----------------------------------------
set -g mouse on
# NOTE: mouse on 상태에서 터미널 네이티브 복사는 Shift+드래그

# ----------------------------------------
# Terminal
# ----------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-features ',ghostty:clipboard:strikethrough:usstyle:RGB'

# Extended key support (Ghostty community 권장)
set -s extended-keys on
set -s extended-keys-format csi-u
set -as terminal-features 'xterm-ghostty:extkeys'

# ----------------------------------------
# Mouse scroll fix for alternate screen
# ----------------------------------------
# - TUI 앱이 마우스 캡처한 경우 (Claude Code, vim 등) → 마우스 이벤트 그대로 전달
# - alternate screen에서 마우스 미캡처 (less 등) → arrow key로 변환
# - 일반 화면 → copy-mode 진입
bind-key -n WheelUpPane {
  if-shell -F '#{mouse_any_flag}' {
    send-keys -M
  } {
    if-shell -F '#{alternate_on}' {
      send-keys Up Up Up
    } {
      copy-mode -e
    }
  }
}
bind-key -n WheelDownPane {
  if-shell -F '#{mouse_any_flag}' {
    send-keys -M
  } {
    if-shell -F '#{alternate_on}' {
      send-keys Down Down Down
    }
  }
}
